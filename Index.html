<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SBA Result Management System — MALIK NAVEED</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ══ RESET & VARS ══ */
:root{
  --g1:#0d4a28;--g2:#1a6b3c;--g3:#27ae60;--gp:#e8f5ee;
  --gold:#f1c40f;--gold2:#f39c12;--red:#c0392b;--blue:#2980b9;
  --text:#1a1a1a;--sub:#555;--light:#888;--border:#dde8e2;
  --white:#fff;--bg:#f4f7f5;
  --urdu:'Noto Nastaliq Urdu',serif;
  --body:'DM Sans',sans-serif;
  --r:12px;--rs:8px;
  --sh:0 2px 12px rgba(13,74,40,.10);
  --shh:0 8px 28px rgba(13,74,40,.18);
  --sw:250px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--body);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
ul{list-style:none}
.hidden{display:none!important}
.urdu{font-family:var(--urdu);direction:rtl}

/* ══ SCREENS ══ */
.screen{display:none}
.screen.active{display:block}
#appScreen.active{display:flex}

/* ══ LOGIN ══ */
.login-wrap{
  min-height:100vh;
  background:linear-gradient(135deg,#0a3d22 0%,#1a6b3c 50%,#0a3d22 100%);
  display:flex;align-items:center;justify-content:center;padding:20px;
  position:relative;overflow:hidden;
}
.login-wrap::before,.login-wrap::after{
  content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,.04);
}
.login-wrap::before{width:500px;height:500px;top:-200px;left:-150px}
.login-wrap::after{width:350px;height:350px;bottom:-120px;right:-100px}
.login-card{
  background:#fff;border-radius:22px;padding:36px 32px;
  width:100%;max-width:430px;position:relative;z-index:2;
  box-shadow:0 30px 80px rgba(0,0,0,.35);
  animation:fadeUp .5s ease;
}
.login-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:5px;
  background:linear-gradient(90deg,#1a6b3c,#27ae60,#f39c12,#27ae60,#1a6b3c);
  border-radius:22px 22px 0 0;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.login-head{text-align:center;margin-bottom:26px}
.login-school-urdu{font-size:13px;color:#888;margin-bottom:4px}
.login-title{font-size:18px;font-weight:800;color:var(--text);margin:2px 0}
.login-by{font-size:13px;font-weight:700;color:var(--red)}
.login-badge{display:inline-block;font-size:10px;background:var(--gp);color:var(--g2);padding:2px 10px;border-radius:20px;margin-top:6px;font-weight:700;letter-spacing:.5px}
.role-tabs{display:flex;gap:6px;background:#f2f2f2;border-radius:10px;padding:4px;margin-bottom:20px}
.role-tab{flex:1;padding:9px 6px;border-radius:8px;border:none;font-size:13px;font-weight:700;transition:all .2s;background:transparent;color:#666}
.role-tab.active{background:linear-gradient(135deg,var(--g2),var(--g3));color:#fff;box-shadow:0 4px 14px rgba(26,107,60,.35)}
.fgrp{margin-bottom:16px}
.fgrp label{display:block;font-size:12px;font-weight:700;color:#444;margin-bottom:5px}
.finp{width:100%;padding:11px 14px;border:2px solid #e0e0e0;border-radius:var(--rs);font-size:14px;outline:none;transition:border-color .2s}
.finp:focus{border-color:var(--g2)}
.pw-wrap{position:relative}
.pw-wrap .finp{padding-right:42px}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;color:#999}
.login-err{color:var(--red);font-size:12px;background:#fdecea;padding:8px 12px;border-radius:var(--rs);margin-bottom:12px}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--g2),var(--g3));color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:800;box-shadow:0 6px 20px rgba(26,107,60,.4);transition:transform .2s}
.btn-login:hover{transform:translateY(-2px)}
.login-foot{text-align:center;margin-top:18px;font-size:12px;color:#888}

/* ══ SIDEBAR ══ */
.sidebar{
  width:var(--sw);background:linear-gradient(180deg,#0a3d22 0%,#1a6b3c 100%);
  display:flex;flex-direction:column;height:100vh;
  position:fixed;left:0;top:0;z-index:100;
  transition:transform .3s;overflow-y:auto;overflow-x:hidden;
}
.sb-head{display:flex;align-items:center;gap:10px;padding:18px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-icon{width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-title{color:#fff;font-weight:800;font-size:13px;line-height:1.2}
.sb-sub{color:rgba(255,255,255,.55);font-size:10px}
.sb-nav{flex:1;padding:10px 8px}
.sb-section{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1.5px;text-transform:uppercase;padding:12px 10px 4px}
.sb-nav li{margin-bottom:2px}
.sb-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;color:rgba(255,255,255,.7);font-size:12.5px;font-weight:500;transition:all .2s;width:100%;text-align:left;background:none;border:none}
.sb-btn:hover,.sb-nav li.active .sb-btn{background:rgba(255,255,255,.13);color:#fff}
.sb-ico{width:18px;text-align:center;font-size:14px;flex-shrink:0}
.sb-foot{padding:14px;border-top:1px solid rgba(255,255,255,.1)}
.sb-user{color:rgba(255,255,255,.8);font-size:11px;font-weight:600;margin-bottom:8px}
.btn-logout{width:100%;padding:7px;border-radius:7px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.07);color:rgba(255,255,255,.75);font-size:12px;font-weight:700;transition:all .2s}
.btn-logout:hover{background:rgba(255,255,255,.15);color:#fff}

/* ══ MOBILE HEADER ══ */
.mob-head{display:none;position:fixed;top:0;left:0;right:0;z-index:99;background:var(--g2);color:#fff;padding:11px 14px;align-items:center;justify-content:space-between;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.hamburger{background:none;border:none;color:#fff;font-size:22px}

/* ══ MAIN CONTENT ══ */
.main-cnt{margin-left:var(--sw);flex:1;min-height:100vh;padding:22px;background:var(--bg)}

/* ══ PAGE PARTS ══ */
.pg-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px}
.pg-title{font-size:22px;font-weight:900;color:var(--text)}
.pg-sub{font-size:12px;color:var(--light);margin-top:2px}
.pg-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

/* ══ CARDS ══ */
.card{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh);margin-bottom:18px}
.card h3{font-size:14px;font-weight:800;color:var(--text);margin-bottom:16px;display:flex;align-items:center;gap:7px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px}
.stat{background:#fff;border-radius:var(--r);padding:16px;box-shadow:var(--sh);border-left:4px solid;transition:transform .2s}
.stat:hover{transform:translateY(-3px)}
.stat-icon{font-size:24px;margin-bottom:8px}
.stat-val{font-size:24px;font-weight:900}
.stat-lbl{font-size:11px;color:var(--light);margin-top:2px}

/* ══ CLASS GRID ══ */
.cls-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.cls-card{background:#fff;border-radius:var(--r);padding:18px 10px;text-align:center;cursor:pointer;border:2px solid var(--border);box-shadow:var(--sh);transition:all .25s}
.cls-card:hover{border-color:var(--g2);transform:translateY(-4px);box-shadow:var(--shh)}
.cls-num{font-size:34px;font-weight:900;color:var(--g2)}
.cls-lbl{font-size:11px;color:var(--light)}
.cls-cnt{font-size:12px;font-weight:700;color:var(--g3);margin-top:4px}

/* ══ TABLE ══ */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--g2);color:#fff}
thead th{padding:9px 11px;text-align:left;font-weight:700;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .15s}
tbody tr:hover{background:var(--gp)}
tbody td{padding:9px 11px}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.b-green{background:var(--gp);color:var(--g2)}
.b-red{background:#fdecea;color:var(--red)}
.b-gold{background:#fef5e4;color:var(--gold2)}
.b-blue{background:#eaf4fb;color:var(--blue)}
.b-grey{background:#f2f2f2;color:#555}

/* ══ BUTTONS ══ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--rs);border:none;font-size:13px;font-weight:700;transition:all .2s;cursor:pointer}
.btn-g{background:var(--g2);color:#fff}.btn-g:hover{background:var(--g1)}
.btn-gold{background:var(--gold2);color:#fff}.btn-gold:hover{background:#e08e0b}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:#a93226}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#2471a3}
.btn-grey{background:#6c757d;color:#fff}.btn-grey:hover{background:#5a6268}
.btn-out{background:transparent;color:var(--g2);border:2px solid var(--g2)}.btn-out:hover{background:var(--gp)}
.btn-sm{padding:5px 10px;font-size:11px}
.bx{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none}
.bx-g{background:#e8f5ee;color:var(--g2)}.bx-r{background:#fdecea;color:var(--red)}.bx-b{background:#eaf4fb;color:var(--blue)}.bx-gold{background:#fef5e4;color:var(--gold2)}

/* ══ FILTER BAR ══ */
.fbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.srch{flex:1;min-width:180px;padding:8px 13px;border:2px solid var(--border);border-radius:var(--rs);font-size:13px;outline:none;transition:border-color .2s}
.srch:focus{border-color:var(--g2)}
.fsel{padding:8px 11px;border:2px solid var(--border);border-radius:var(--rs);font-size:13px;outline:none;background:#fff;transition:border-color .2s}
.fsel:focus{border-color:var(--g2)}

/* ══ TERM TABS ══ */
.term-tabs{display:flex;gap:4px;background:#f0f0f0;border-radius:9px;padding:4px;margin-bottom:14px}
.t-tab{flex:1;padding:8px 6px;border-radius:7px;border:none;font-size:12px;font-weight:700;transition:all .2s;background:transparent;color:#666}
.t-tab.active{background:var(--g2);color:#fff}

/* ══ MARKS ENTRY ══ */
.marks-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)}
.marks-row:hover{background:var(--gp)}
.marks-subj{flex:1;font-size:13px;font-weight:600;font-family:var(--urdu);direction:rtl}
.marks-max{font-size:11px;color:var(--light);white-space:nowrap;min-width:50px;text-align:right}
.marks-inp{
  width:74px;padding:6px 8px;border:2px solid var(--border);
  border-radius:7px;text-align:center;font-weight:700;font-size:14px;outline:none;transition:border-color .2s
}
.marks-inp:focus{border-color:var(--g2)}
.marks-inp.ok{border-color:var(--g3)}
.marks-inp.bad{border-color:var(--red);background:#fff8f8}
.abs-label{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--red);font-weight:600;white-space:nowrap;cursor:pointer}

/* ══ RESULT SUMMARY ══ */
.res-sum{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:14px;border-top:2px solid var(--gp)}
.rs-box{text-align:center;padding:10px 6px;background:var(--gp);border-radius:9px}
.rs-val{font-size:20px;font-weight:900}
.rs-lbl{font-size:10px;color:var(--light);margin-top:2px}

/* ══ MODAL ══ */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:14px}
.modal-box{background:#fff;border-radius:18px;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;box-shadow:var(--shh);animation:fadeUp .3s ease}
.modal-hd{padding:16px 18px 12px;font-size:16px;font-weight:800;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-close{background:none;border:none;font-size:20px;color:#999;cursor:pointer;line-height:1}
.modal-body{padding:18px}
.modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:22px;right:22px;z-index:9999;background:var(--g1);color:#fff;padding:11px 18px;border-radius:9px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:fadeUp .3s ease;max-width:320px}
.toast.err{background:var(--red)}
.toast.warn{background:var(--gold2)}

/* ══ PROGRESS ══ */
.pbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;background:var(--g3);transition:width .4s}

/* ══ GRADE CHIP ══ */
.gchip{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-weight:900;font-size:13px;color:#fff}
.gA\+{background:#1a6b3c}.gA{background:#27ae60}.gB{background:#2980b9}.gC{background:#8e44ad}.gD{background:#f39c12}.gE{background:#e67e22}.gF{background:#c0392b}

/* ══ UPLOAD ZONE ══ */
.upload-zone{border:2px dashed var(--border);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;transition:all .2s}
.upload-zone:hover,.upload-zone.drag{border-color:var(--g2);background:var(--gp)}
.upload-zone .uz-icon{font-size:36px;margin-bottom:8px}
.upload-zone .uz-txt{font-size:14px;font-weight:600;color:var(--sub)}
.upload-zone .uz-sub{font-size:11px;color:var(--light);margin-top:4px}

/* ══ ATTENDANCE ══ */
.att-cell{width:32px;height:32px;border-radius:6px;border:2px solid var(--border);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .15s;background:#fff}
.att-cell.P{background:#e8f5ee;border-color:var(--g3);color:var(--g2)}
.att-cell.A{background:#fdecea;border-color:var(--red);color:var(--red)}
.att-cell.L{background:#fef5e4;border-color:var(--gold2);color:var(--gold2)}

/* ══ PRINT / RESULT CARD ══ */
#printOverlay{position:fixed;inset:0;background:#e8e8e8;z-index:2000;overflow-y:auto;display:flex;flex-direction:column}
.print-bar{display:flex;gap:10px;padding:12px 16px;background:#0a3d22;position:sticky;top:0;z-index:10;flex-wrap:wrap;align-items:center;flex-shrink:0}
.print-bar span{color:rgba(255,255,255,.7);font-size:13px;flex:1}

/* A4 RESULT CARD - PECTAA Exact Style */
.rc-page{
  width:210mm;margin:10px auto;background:#fff;padding:0;
  font-family:"Noto Nastaliq Urdu","DM Sans",Arial,sans-serif;
  font-size:10px;color:#000;direction:rtl;
  position:relative;box-shadow:0 4px 24px rgba(0,0,0,.18);
  page-break-after:always;page-break-inside:avoid;
  display:flex;flex-direction:column;min-height:295mm;
}
.rc-page::after{
  content:"SBA";position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(-35deg);
  font-size:170px;font-weight:900;letter-spacing:8px;
  color:rgba(26,107,60,.04);pointer-events:none;z-index:0;
  font-family:"DM Sans",sans-serif;
}
/* Top coloured strip */
.rc-topstrip{
  height:16px;flex-shrink:0;
  background:linear-gradient(90deg,#1a6b3c 0%,#39b54a 60%,#8dc63f 100%);
}
/* Inner wrapper with padding */
.rc-inner{padding:7mm 10mm 5mm;flex:1;position:relative;z-index:1;display:flex;flex-direction:column}
/* Header */
.rc-hdr{text-align:center;border-bottom:3px solid #1a6b3c;padding-bottom:7px;margin-bottom:7px}
.rc-hdr-title{
  font-family:"Noto Nastaliq Urdu",serif;font-size:22px;
  font-weight:700;color:#1a6b3c;direction:rtl;line-height:1.6;
}
.rc-hdr-year{font-family:"Noto Nastaliq Urdu",serif;font-size:12px;color:#333;direction:rtl;margin-top:2px}
.rc-hdr-pectaa{font-size:8.5px;color:#777;margin-top:2px;direction:ltr}
/* Info table — underline style */
.rc-info-tbl{width:100%;border-collapse:collapse;margin-bottom:7px;font-size:10.5px;direction:rtl}
.rc-info-tbl td{padding:4px 5px;border-bottom:1px solid #aaa;vertical-align:bottom}
.rc-info-tbl .lbl{font-family:"Noto Nastaliq Urdu",serif;font-weight:700;color:#111;white-space:nowrap;width:13%}
.rc-info-tbl .val{color:#111;min-width:80px}
.rc-info-tbl .val-name{font-weight:800;color:#1a6b3c;font-size:12px}
/* Marks table */
.rc-tbl{width:100%;border-collapse:collapse;margin-bottom:7px;direction:rtl;table-layout:fixed;font-size:9px}
.rc-tbl th,.rc-tbl td{border:1px solid #333;padding:3px 2px;text-align:center;vertical-align:middle}
.rc-tbl .rh1{background:#1a6b3c;color:#fff;font-family:"Noto Nastaliq Urdu",serif;font-weight:700;font-size:9.5px;direction:rtl}
.rc-tbl .rh2{background:#c8e6c9;color:#1a6b3c;font-family:"Noto Nastaliq Urdu",serif;font-weight:700;font-size:8.5px;direction:rtl}
.rc-tbl .subj{text-align:right;padding:3px 5px;font-family:"Noto Nastaliq Urdu",serif;direction:rtl;white-space:normal;word-break:break-word;font-size:9px;font-weight:600}
.rc-tbl .sno{font-weight:900;font-size:9px;color:#1a6b3c;background:#f0f7f0}
.rc-tbl .rA{background:#fff}
.rc-tbl .rB{background:#f5fbf5}
.rc-tbl .r-tot{background:#1a6b3c;color:#fff;font-weight:700}
.rc-tbl .r-tot .subj{background:#1a6b3c;color:#fff;font-family:"Noto Nastaliq Urdu",serif}
/* Bottom boxes */
.rc-bot{display:flex;gap:7px;margin-bottom:7px;direction:rtl}
.rc-grd-box{flex:0 0 112px;border:2px solid #1a6b3c;border-radius:6px;padding:6px}
.rc-grd-ttl{font-family:"Noto Nastaliq Urdu",serif;direction:rtl;font-weight:700;color:#1a6b3c;margin-bottom:4px;font-size:10px;text-align:right}
.rc-grd-row{display:flex;justify-content:space-between;align-items:center;padding:2px 3px;border-radius:3px;font-size:9px;direction:rtl;margin-bottom:1px}
.rc-grd-row .glabel{font-family:"Noto Nastaliq Urdu",serif;font-size:9px}
.rc-grd-row.hi{background:#1a6b3c;color:#fff}
.rc-grd-row .gval{font-weight:900;font-size:10px;min-width:22px;text-align:left}
.rc-akh{flex:1.4;border:2px solid #1a6b3c;border-radius:6px;padding:6px;font-family:"Noto Nastaliq Urdu",serif;direction:rtl;font-size:8.5px;color:#333;line-height:1.8;text-align:right}
.rc-rmk{flex:1.8;border:2px solid #1a6b3c;border-radius:6px;padding:6px}
.rc-rmk-ttl{font-family:"Noto Nastaliq Urdu",serif;direction:rtl;font-weight:700;color:#1a6b3c;margin-bottom:6px;font-size:10px;text-align:right}
.rc-rmk-line{border-bottom:1px solid #bbb;min-height:16px;margin-bottom:5px;padding:1px 3px;font-family:"Noto Nastaliq Urdu",serif;direction:rtl;font-size:8.5px;line-height:1.7;text-align:right}
/* Signatures */
.rc-sigs{display:flex;justify-content:space-between;margin-top:12px;padding-top:7px;border-top:1px solid #999;direction:rtl}
.rc-sig{text-align:center}
.rc-sig-line{border-top:1px solid #222;width:110px;margin:0 auto 4px}
.rc-sig-lbl{font-family:"Noto Nastaliq Urdu",serif;direction:rtl;font-size:9px;color:#333}
/* Yellow footer */
.rc-foot{background:#f1c40f;color:#fff;text-align:center;padding:5px 8px;border-radius:4px;margin-top:8px;font-family:"Noto Nastaliq Urdu",serif;direction:rtl;font-size:9.5px;font-weight:700;line-height:1.5}
/* Bottom green strip */
.rc-botstrip{height:14px;background:linear-gradient(90deg,#1a6b3c,#39b54a,#8dc63f);margin-top:auto;flex-shrink:0}

/* GAZETTE — keep on one page */
.gazette-page{
  width:297mm;margin:12px auto;background:#fff;
  padding:8mm 10mm;font-size:8.5px;
  box-shadow:0 4px 20px rgba(0,0,0,.15);
  page-break-after:always;page-break-inside:avoid;
}
.gazette-page table{width:100%;border-collapse:collapse;font-size:7.5px}
.gazette-page th{background:var(--g2);color:#fff;padding:4px 3px;border:1px solid #555;text-align:center;font-size:7px;white-space:nowrap}
.gazette-page td{padding:3px;border:1px solid #ccc;text-align:center;vertical-align:middle}
.gazette-page .subj-h{font-family:var(--urdu);direction:rtl;font-size:7px;writing-mode:vertical-rl;text-orientation:mixed;max-height:60px}
.gazette-page .pos1{background:#fffde7}.gazette-page .pos2{background:#f5f5f5}.gazette-page .pos3{background:#fff3e0}

/* ATTENDANCE PRINT */
.att-page{width:297mm;margin:12px auto;background:#fff;padding:8mm;font-size:9px;box-shadow:0 4px 20px rgba(0,0,0,.15);page-break-after:always}

/* ══ RESPONSIVE ══ */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .mob-head{display:flex}
  .main-cnt{margin-left:0;padding:66px 12px 16px}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .res-sum{grid-template-columns:repeat(2,1fr)}
  .rc-bottom{flex-direction:column}
  .rc-page{width:100%;padding:8mm}
  .gazette-page{width:100%;overflow-x:auto}
}

/* ══ PRINT ══ */
@media print{
  body>*{display:none!important}
  #printOverlay{display:flex!important;flex-direction:column;background:none!important;position:fixed!important;inset:0!important;z-index:9999!important}
  .print-bar{display:none!important}
  #printContent{display:block!important;background:white}
  .rc-page,.gazette-page,.att-page{
    box-shadow:none!important;
    page-break-after:always;
    page-break-inside:avoid;
  }
  @page{size:A4 portrait;margin:0}
  .gazette-page{page-break-after:always}
  @page gazette{size:A4 landscape;margin:0}
}
</style>

let GAS_URL=localStorage.getItem('sba_gas_url')||'';

// Auto-save mark to Google Sheets when teacher enters
async function syncMarkToSheet(enrl,cls,term,subjIdx,val,subjName){
  const url=GAS_URL||localStorage.getItem('sba_gas_url')||'';
  if(!url||url==='YOUR_GAS_URL')return; // skip if not configured
  try{
    fetch(url,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        action:'saveMark',
        enrl,cls,term,subjIdx,val,
        subjName,
        maxM:val==='A'?0:(SUBS[cls]||[])[subjIdx]?.[term==='T1'?'max1':term==='T2'?'max2':'maxF']||50,
        by:CU?CU.name:'unknown',
        timestamp:new Date().toISOString()
      })
    }).then(r=>r.json()).then(d=>{
      if(d.ok)console.log('Sheet synced ✓');
    }).catch(()=>{});
  }catch(e){}
}

function calcTotals(e,c,t){
  const subs=SUBS[c]||[];
  let obt=0,max=0,absCnt=0;
  const rows=subs.map((s,i)=>{
    const v=getMk(e,c,t,i);
    const mxMap={T1:s.max1,T2:s.max2,FIN:s.maxF};
    const mx=mxMap[t]||s.max1;
    if(v==='A'){absCnt++;return{...s,v:'A',obt:0,max:mx,idx:i}}
    const n=parseFloat(v)||0;
    obt+=n;max+=mx;
    return{...s,v,obt:n,max:mx,idx:i}
  });
  const pct=max>0?parseFloat(((obt/max)*100).toFixed(1)):0;
  return{rows,obt,max,pct,grade:getGrade(pct),absCnt}
}

function saveEditStudent(e,c){

function handleXlDrop(e){e.preventDefault();e.currentTarget.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)processUploadFile(f)}
function handleXlFile(inp){const f=inp.files[0];if(f)processUploadFile(f);inp.value=''}
function processUploadFile(file){
  const out=document.getElementById('uploadResult');
  out.innerHTML='<div style="color:#888;font-size:13px">⏳ Processing file...</div>';
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result;
    const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
    let added=0,updated=0,errors=[];
    // skip header
    for(let i=1;i<lines.length;i++){
      const cols=lines[i].split(',').map(c=>c.trim().replace(/^"|"$/g,''));
      if(cols.length<4){errors.push(`Row ${i+1}: کالم کم ہیں`);continue}
      const[name,father,cls,enrl,bform='',dob='']=cols;
      const c=parseInt(cls);
      if(!name||!father||!enrl||isNaN(c)||c<1||c>8){errors.push(`Row ${i+1}: ڈیٹا غلط`);continue}
      const ex=STUDENTS.findIndex(s=>s.e===enrl&&s.c===c);
      if(ex>=0){STUDENTS[ex]={...STUDENTS[ex],n:name.toUpperCase(),f:father.toUpperCase(),b:bform,d:dob};updated++}
      else{STUDENTS.push({e:enrl,n:name.toUpperCase(),f:father.toUpperCase(),c,d:dob,b:bform});added++}
    }
    saveStudents();
    out.innerHTML=`<div style="background:#e8f5ee;border-radius:8px;padding:14px;font-size:13px">
      ✅ <strong>${added}</strong> new students added | <strong>${updated}</strong> updated
      ${errors.length?`<br><span style="color:#c0392b">⚠️ ${errors.length} errors: ${errors.slice(0,3).join(', ')}</span>`:''}
    </div>`;
  };
  if(file.name.endsWith('.csv'))reader.readAsText(file);
  else{out.innerHTML='<div style="color:#c0392b;font-size:13px">⚠️ براہ کرم CSV فارمیٹ استعمال کریں۔ Excel کو CSV کے طور پر محفوظ کریں۔</div>'}
}

function filterMkList(q){document.querySelectorAll('#mkTbl tbody tr').forEach(r=>r.style.display=r.textContent.toLowerCase().includes(q.toLowerCase())?'':'')}
function openMkForm(e){mStu=STUDENTS.find(s=>s.e===e&&s.c===mCls);if(!mStu)return;document.getElementById('marksFormPanel').innerHTML=renderMkForm();document.getElementById('marksFormPanel').classList.remove('hidden');document.getElementById('marksFormPanel').scrollIntoView({behavior:'smooth'})}

  const s=mStu;
  const subs=SUBS[s.c]||[];
  const tLbl=mTerm==='T1'?'First Term':mTerm==='T2'?'Mid Term':'Final Term';

  return`<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px">
      <div>
        <div style="font-size:16px;font-weight:800">${s.n}</div>

      <div style="display:flex;gap:8px">
        <button class="btn btn-gold" onclick="printCard('${s.e}',${s.c})">🖨️ Print</button>

      </div>
    </div>

      📝 ${tLbl}
    </div>
    ${subs.map((sub,i)=>{
      const maxM=mTerm==='T1'?sub.max1:mTerm==='T2'?sub.max2:sub.maxF;
      const val=getMk(s.e,s.c,mTerm,i);
      const isAbs=val==='A';
      const canEdit=CU&&(CU.role==='admin'||canTeacherEditSubject(CU.user,s.c,i));
      const termLocked=isTermLocked(mTerm);
      const disabled=isAbs||!canEdit||termLocked;
      return`<div class="marks-row" style="${!canEdit?'opacity:0.45;':''}">

        </div>
        <div class="marks-max">Max: ${maxM}</div>
        <label class="abs-label" style="${!canEdit?'pointer-events:none':''}">
          <input type="checkbox" ${isAbs?'checked':''} ${!canEdit||termLocked?'disabled':''} onchange="togAbs('${s.e}',${s.c},${i},this.checked,${maxM})"/> Absent

        <input type="number" step="0.5" min="0" max="${maxM}"

          value="${isAbs?'':val}" ${disabled?'disabled':''}

          oninput="liveMk(this,${maxM})"

      <div class="rs-box"><div class="rs-val" style="color:#1a6b3c" id="rsObt">${obt}</div><div class="rs-lbl">Obtained</div></div>
      <div class="rs-box"><div class="rs-val" style="color:#2980b9" id="rsMax">${max}</div><div class="rs-lbl">Total</div></div>
      <div class="rs-box"><div class="rs-val" style="color:#8e44ad" id="rsPct">${pct}٪</div><div class="rs-lbl">Percentage</div></div>

    </div>
  </div>`;
}
function liveMk(inp,max){
  if(inp.value===''){inp.classList.remove('ok','bad');inp.style.borderColor='var(--border)';inp.style.background='';return}
  const v=parseFloat(inp.value);
  if(isNaN(v)){inp.classList.add('bad');inp.classList.remove('ok');return}
  const r=Math.round(v*2)/2;
  if(Math.abs(v-r)>0.001||v<0||v>max){inp.classList.add('bad');inp.classList.remove('ok');inp.style.background='#fff8f8';}
  else{inp.classList.add('ok');inp.classList.remove('bad');inp.style.borderColor='';inp.style.background='';}
}
function saveMk(e,c,i,val,max){
  if(isTermLocked(mTerm)){showToast('This term is locked by Admin!','err');document.getElementById('mi'+i).value=getMk(e,c,mTerm,i)||'';return}
  if(CU&&CU.role!=='admin'&&!canTeacherEditSubject(CU.user,c,i)){showToast('You are not assigned to this subject!','err');document.getElementById('mi'+i).value=getMk(e,c,mTerm,i)||'';return}
  if(val===''||val===null){setMk(e,c,mTerm,i,'');refreshRS(e,c);return}
  const n=parseFloat(val);
  if(isNaN(n)){showToast('صحیح نمبر لکھیں!','err');document.getElementById('mi'+i).value='';return}
  if(n>max){showToast(`Marks cannot exceed ${max}!`,'err');document.getElementById('mi'+i).value=max;return}
  if(n<0){showToast('Marks cannot be negative!','err');document.getElementById('mi'+i).value=0;return}
  const r=Math.round(n*2)/2;
  if(Math.abs(n-r)>0.001){showToast('Only .0 or .5 values allowed (e.g. 40, 40.5)','warn');document.getElementById('mi'+i).value=r;return}
  setMk(e,c,mTerm,i,String(r));
  const inp2=document.getElementById('mi'+i);
  inp2.value=r;inp2.classList.add('ok');inp2.classList.remove('bad');
  inp2.style.borderColor='';inp2.style.background='';
  refreshRS(e,c);
  // Auto-sync to Google Sheets
  const subs=SUBS[c]||[];
  syncMarkToSheet(e,c,mTerm,i,String(r),subs[i]?.en||'');
}
function togAbs(e,c,i,absent,max){
  if(isTermLocked(mTerm)){showToast('This term is locked by Admin!','err');return}
  if(CU&&CU.role!=='admin'&&!canTeacherEditSubject(CU.user,c,i)){showToast('You are not assigned to this subject!','err');return}
  const inp=document.getElementById('mi'+i);
  if(absent){setMk(e,c,mTerm,i,'A');inp.value='';inp.disabled=true;inp.classList.remove('ok','bad');
    syncMarkToSheet(e,c,mTerm,i,'A',(SUBS[c]||[])[i]?.en||'');
  }else{setMk(e,c,mTerm,i,'');inp.disabled=false}
  refreshRS(e,c);
}
function refreshRS(e,c){
  const{obt,max,pct,grade}=calcTotals(e,c,mTerm);
  const el=id=>document.getElementById(id);
  if(el('rsObt'))el('rsObt').textContent=obt;
  if(el('rsMax'))el('rsMax').textContent=max;
  if(el('rsPct'))el('rsPct').textContent=pct+'%';
  if(el('rsGrd')){el('rsGrd').textContent=grade;el('rsGrd').style.color=getGradeColor(grade)}
  document.getElementById('stListPanel').innerHTML=renderStList();
}
function saveRmk(e){localStorage.setItem('rmk_'+e,document.getElementById('rmkTA')?.value||'');showToast('Remarks saved ✓')}

function toggleTermLock(term){
  if(!CU||CU.role!=='admin'){showToast('Admin only!','err');return}
  const locked=!isTermLocked(term);
  setTermLock(term,locked);
  const lbl=term==='T1'?'First':term==='T2'?'Mid':'Final';
  showToast(locked?`🔒 ${lbl} Term LOCKED — teachers cannot edit`:`🔓 ${lbl} Term UNLOCKED`);
  nav('marks'); // stay on marks page to see effect
}
function adminToggleLock(term){
  toggleTermLock(term);
  nav('results');
}

function pgGazette(){
  return`

  </div></div>

    <div class="fbar">

      </select>

      <button class="btn btn-gold" onclick="printGazette()">🖨️ Print</button>
    </div>
    <div id="gzOut"></div>
  </div>`;
}
function buildGazette(){
  const cls=parseInt(document.getElementById('gzCls').value);
  const term=document.getElementById('gzTrm').value;
  const tLbl=term==='T1'?'First Term':term==='T2'?'Mid Term':'End of Year Final Term';
  const sch=getSch();
  const sts=STUDENTS.filter(s=>s.c===cls);
  const subs=SUBS[cls]||[];
  const results=sts.map(s=>{
    const{obt,max,pct,grade}=calcTotals(s.e,s.c,term);
    const subMarks=subs.map((_,i)=>getMk(s.e,s.c,term,i));
    return{...s,obt,max,pct,grade,subMarks};
  }).sort((a,b)=>b.pct-a.pct).map((s,i)=>({...s,pos:s.pct>0?i+1:'-'}));

  const pass=results.filter(r=>r.pct>=33).length;
  const fail=results.length-pass;

  document.getElementById('gzOut').innerHTML=`
  <div style="margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap">
    <span class="badge b-green" style="font-size:13px;padding:5px 12px">✅ Pass: ${pass}</span>
    <span class="badge b-red" style="font-size:13px;padding:5px 12px">❌ فیل: ${fail}</span>
    <span class="badge b-blue" style="font-size:13px;padding:5px 12px">کل: ${results.length}</span>
    <span class="badge b-gold" style="font-size:13px;padding:5px 12px">Rate: ${results.length?((pass/results.length)*100).toFixed(1):0}%</span>
  </div>
  <div style="overflow-x:auto;font-size:11px">
  <table style="width:100%;border-collapse:collapse;min-width:600px">
    <thead>
      <tr style="background:#1a6b3c;color:#fff">
        <th style="padding:6px 5px;border:1px solid #555">Pos</th>
        <th style="padding:6px 5px;border:1px solid #555">Enroll</th>
        <th style="padding:6px 5px;border:1px solid #555;min-width:140px">Name</th>
        <th style="padding:6px 5px;border:1px solid #555;min-width:120px">Father</th>
        ${subs.map(s=>`<th style="padding:3px;border:1px solid #555;font-size:9px;writing-mode:vertical-lr;height:60px;text-orientation:mixed">${s.en}</th>`).join('')}
        <th style="padding:6px 5px;border:1px solid #555">Obtained</th>
        <th style="padding:6px 5px;border:1px solid #555">Total</th>
        <th style="padding:6px 5px;border:1px solid #555">%</th>
        <th style="padding:6px 5px;border:1px solid #555">Grade</th>
        <th style="padding:6px 5px;border:1px solid #555">Result</th>
      </tr>
    </thead>
    <tbody>
      ${results.map((r,i)=>{
        const bg=r.pos===1?'#fffde7':r.pos===2?'#f5f5f5':r.pos===3?'#fff3e0':'#fff';
        return`<tr style="background:${bg}">
          <td style="border:1px solid #ddd;text-align:center;font-weight:900;padding:5px">${r.pos}</td>
          <td style="border:1px solid #ddd;text-align:center;padding:5px">${r.e}</td>
          <td style="border:1px solid #ddd;font-weight:700;padding:5px">${r.n}</td>
          <td style="border:1px solid #ddd;font-size:11px;padding:5px">${r.f}</td>
          ${r.subMarks.map(v=>`<td style="border:1px solid #ddd;text-align:center;padding:5px;font-size:11px">${v===''?'—':v==='A'?'Abs':v}</td>`).join('')}
          <td style="border:1px solid #ddd;text-align:center;font-weight:700;color:#1a6b3c;padding:5px">${r.obt}</td>
          <td style="border:1px solid #ddd;text-align:center;padding:5px">${r.max}</td>
          <td style="border:1px solid #ddd;text-align:center;font-weight:700;color:#c0392b;padding:5px">${r.pct}٪</td>
          <td style="border:1px solid #ddd;text-align:center;padding:5px"><span style="background:${getGradeColor(r.grade)};color:#fff;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:700">${r.grade}</span></td>

        </tr>`;
      }).join('')}
    </tbody>
  </table></div>
  <div id="gzData" data-cls="${cls}" data-term="${term}" style="display:none"></div>`;

    </div>
  </div></div>
  <div id="srOut"></div>`;
}
function srRefSubs(){
  const sel=document.getElementById('srSubj');if(!sel)return;
  const subs=SUBS[SR.cls]||[];
  sel.innerHTML='<option value="-1">-- All Subjects Summary --</option>'+subs.map((s,i)=>`<option value="${i}">${s.en}</option>`).join('');
  document.getElementById('srOut').innerHTML='';
}
function buildSubReport(){
  const cls=parseInt(document.getElementById('srCls')?.value||SR.cls);
  const term=document.getElementById('srTrm')?.value||SR.term;
  SR.cls=cls;SR.term=term;
  const si=parseInt(document.getElementById('srSubj')?.value??'-1');
  SR.si=si<0?null:si;
  const tLbl=term==='T1'?'First Term':term==='T2'?'Mid Term':'Final Term';
  const subs=SUBS[cls]||[];
  const sts=STUDENTS.filter(s=>s.c===cls);
  const out=document.getElementById('srOut');
  if(si<0){
    const rows=subs.map((sub,i)=>{
      const mx=term==='T1'?sub.max1:term==='T2'?sub.max2:sub.maxF;
      const vals=sts.map(s=>getMk(s.e,s.c,term,i));
      const nums=vals.filter(v=>v!==''&&v!=='A').map(Number);
      const absC=vals.filter(v=>v==='A').length;
      const avg=nums.length?(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1):'-';
      const pass=nums.filter(m=>m>=mx*0.33).length;
      const pr=nums.length?((pass/nums.length)*100).toFixed(0):0;
      return{sub,i,mx,avg,hi:nums.length?Math.max(...nums):'-',lo:nums.length?Math.min(...nums):'-',pass,fail:nums.length-pass,absC,pr,tot:nums.length};
    });
    out.innerHTML=`<div class="card"><h3>Class ${cls} — ${tLbl} — All Subjects</h3>
    <div class="tbl-wrap"><table>
      <thead><tr><th>#</th><th>Subject</th><th>Teacher</th><th>Max</th><th>Avg</th><th>High</th><th>Low</th><th>Pass</th><th>Fail</th><th>Absent</th><th>Pass%</th><th>Detail</th></tr></thead>
      <tbody>${rows.map((r,idx)=>`<tr>
        <td>${idx+1}</td><td style="font-weight:700">${r.sub.en}</td>
        <td style="text-align:center">${r.mx}</td>
        <td style="text-align:center;color:#2980b9;font-weight:700">${r.avg}</td>
        <td style="text-align:center;color:#1a6b3c;font-weight:700">${r.hi}</td>
        <td style="text-align:center;color:#c0392b;font-weight:700">${r.lo}</td>
        <td style="text-align:center;color:#1a6b3c;font-weight:700">${r.pass}</td>
        <td style="text-align:center;color:#c0392b;font-weight:700">${r.fail}</td>
        <td style="text-align:center">${r.absC}</td>
        <td style="text-align:center">
          <div style="display:flex;align-items:center;gap:5px">
            <div style="flex:1;height:6px;background:#eee;border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${r.pr}%;background:${r.pr>=33?'#1a6b3c':'#c0392b'};border-radius:3px"></div>
            </div><span style="font-weight:700;font-size:11px">${r.pr}%</span>
          </div>
        </td>
        <td><button class="bx bx-g" onclick="document.getElementById('srSubj').value=${r.i};buildSubReport()">→ Detail</button></td>
      </tr>`).join('')}</tbody>
    </table></div></div>`;
  } else {
    const sub=subs[si];if(!sub){showToast('Subject not found','err');return}
    const mx=term==='T1'?sub.max1:term==='T2'?sub.max2:sub.maxF;
    const res=sts.map(s=>{
      const v=getMk(s.e,s.c,term,si);
      const abs=v==='A';const obt=abs||v===''?null:parseFloat(v)||0;
      const pct=obt!==null?parseFloat(((obt/mx)*100).toFixed(1)):null;
      return{...s,abs,obt,pct,grade:pct!==null?getGrade(pct):'-'};
    });
    const sorted=[...res].sort((a,b)=>{
      if(a.obt===null&&b.obt!==null)return 1;if(a.obt!==null&&b.obt===null)return-1;
      return(b.obt||0)-(a.obt||0);
    });
    let rk=1;sorted.forEach((r,i)=>{
      if(r.obt===null){r.rank='-';}
      else{if(i>0&&sorted[i-1].obt===r.obt)r.rank=sorted[i-1].rank;else r.rank=rk;rk++;}
    });
    const nums=res.filter(r=>r.obt!==null).map(r=>r.obt);
    const pass=nums.filter(m=>m>=mx*0.33).length;
    const avg=nums.length?(nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1):0;
    // Find assigned teacher for this subject+class
    const assigned=TIMETABLE.find(t=>t.cls===cls&&t.subjIdx===si);
    const teacherLabel=assigned?`Teacher: <strong>${assigned.teacherName}</strong>`:'Teacher: <em style="color:#888">Not assigned</em>';
    out.innerHTML=`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px">
        <div>
          <h3 style="margin:0 0 4px 0">Class ${cls} — ${sub.en} — ${tLbl}</h3>
          <div style="font-size:12px;color:#555">${teacherLabel}</div>
        </div>
        <button class="btn btn-g btn-sm" onclick="document.getElementById('srSubj').value=-1;buildSubReport()">← Back to Summary</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px;margin-bottom:14px">
        ${[{l:'Students',v:sts.length,c:'#1a6b3c'},{l:'Appeared',v:nums.length,c:'#2980b9'},
           {l:'Absent',v:res.filter(r=>r.abs).length,c:'#c0392b'},{l:'Pass',v:pass,c:'#27ae60'},
           {l:'Fail',v:nums.length-pass,c:'#e74c3c'},{l:'Average',v:avg,c:'#8e44ad'},
           {l:'Pass Rate',v:nums.length?((pass/nums.length)*100).toFixed(0)+'%':'0%',c:'#f39c12'}
          ].map(s=>`<div style="background:${s.c}18;border-left:3px solid ${s.c};padding:10px;border-radius:8px">
            <div style="font-size:18px;font-weight:900;color:${s.c}">${s.v}</div>
            <div style="font-size:10px;color:#666;margin-top:2px">${s.l}</div>
          </div>`).join('')}
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Rank</th><th>Roll No</th><th>Student Name</th><th>Father</th>
          <th>Marks (/${mx})</th><th>%</th><th>Grade</th><th>Status</th></tr></thead>
        <tbody>${sorted.map(r=>`<tr style="background:${r.rank===1?'#fffde7':r.rank===2?'#f5f5f5':r.rank===3?'#fff3e0':''}">
          <td style="text-align:center;font-weight:900;color:${r.rank<=3?'#f39c12':'#333'}">${r.rank}</td>
          <td><span class="badge b-blue">${r.e}</span></td>
          <td style="font-weight:700">${r.n}</td>
          <td style="font-size:12px;color:#888">${r.f}</td>
          <td style="text-align:center;font-weight:800;font-size:14px;color:${r.abs?'#c0392b':r.obt!==null?'#1a6b3c':'#888'}">${r.abs?'Absent':r.obt!==null?r.obt:'—'}</td>
          <td style="text-align:center;font-weight:700">${r.pct!==null?r.pct+'%':'—'}</td>
          <td style="text-align:center">${r.grade!=='-'?`<span style="background:${getGradeColor(r.grade)};color:#fff;padding:2px 8px;border-radius:12px;font-weight:900;font-size:12px">${r.grade}</span>`:'—'}</td>
          <td style="text-align:center">${r.abs?'<span class="badge b-gold">Absent</span>':r.obt===null?'<span class="badge b-grey">Pending</span>':r.obt>=mx*0.33?'<span class="badge b-green">Pass</span>':'<span class="badge b-red">Fail</span>'}</td>
        </tr>`).join('')}</tbody>
      </table></div></div>`;
  }
}
function printSubReport(){
  const out=document.getElementById('srOut');
  if(!out||!out.innerHTML.trim()){showToast('Please generate report first!','warn');return}
  const sch=getSch();
  const tLbl=SR.term==='T1'?'First Term':SR.term==='T2'?'Mid Term':'Final Term';
  const subName=SR.si!==null?(SUBS[SR.cls]||[])[SR.si]?.en||'':'All Subjects';

}

function cycleAtt(e,c,month,day,cur){
  const states=['','P','A','L'];
  const next=states[(states.indexOf(cur)+1)%states.length];
  const key=`${e}_${c}_${month}`;
  if(!ATTENDANCE[key])ATTENDANCE[key]={};
  ATTENDANCE[key][day]=next;
  saveAtt();
  // update cell without full re-render
  const cells=document.querySelectorAll('.att-cell');
  // find the cell — re-render the page section
  nav('attendance');
}

// Convert date to Urdu words (e.g. "07-SEP-16" → "سات ستمبر دو ہزار سولہ")
function dobWords(dob){
  if(!dob||dob.length<6)return'——';
  try{
    const months_ur={JAN:'جنوری',FEB:'فروری',MAR:'مارچ',APR:'اپریل',MAY:'مئی',JUN:'جون',
                     JUL:'جولائی',AUG:'اگست',SEP:'ستمبر',OCT:'اکتوبر',NOV:'نومبر',DEC:'دسمبر'};
    const d1=['','ایک','دو','تین','چار','پانچ','چھ','سات','آٹھ','نو','دس',
              'گیارہ','بارہ','تیرہ','چودہ','پندرہ','سولہ','سترہ','اٹھارہ','انیس','بیس',
              'اکیس','بائیس','تئیس','چوبیس','پچیس','چھبیس','ستائیس','اٹھائیس','انتیس','تیس',
              'اکتیس'];
    const parts=dob.split('-');
    if(parts.length<3)return'——';
    const day=parseInt(parts[0]);
    const monKey=parts[1].toUpperCase().substring(0,3);
    const yr=parts[2].length===2?'20'+parts[2]:parts[2];
    const y=parseInt(yr);
    const mon_word=months_ur[monKey]||'';
    const day_word=d1[day]||'';
    // Year to Urdu: e.g. 2016 → دو ہزار سولہ
    const thou=Math.floor(y/1000);
    const rem=y%1000;
    const hundreds=Math.floor(rem/100);
    const tens=rem%100;
    const thou_w=d1[thou]||'';
    const hun_w=hundreds>0?(d1[hundreds]+' سو'):'';
    const ten_w=d1[tens]||'';
    const yr_word=[thou_w,'ہزار',hun_w,ten_w].filter(Boolean).join(' ');
    return [day_word,mon_word,yr_word].filter(Boolean).join(' ');
  }catch(e){return'——';}
}

            <td class="sno">${i+1}</td>
          </tr>`;
        }).join('')}
        ${Array.from({length:emptyCount},(_,i)=>`<tr style="height:18px;background:${(subs.length+i)%2===0?'#fff':'#f5fbf5'}">
          <td class="subj">&nbsp;</td>
          <td></td><td></td><td></td>
          <td></td><td></td><td></td>
          <td></td><td></td><td></td>
          <td class="sno">${subs.length+i+1}</td>
        </tr>`).join('')}
        <tr class="r-tot">
          <td class="subj" style="background:#1a6b3c;color:#fff;font-weight:700">مجموعی نتیجہ</td>
          <td>${t1M}</td><td></td><td style="font-weight:900">${t1O}</td>
          <td>${t2M}</td><td></td><td style="font-weight:900">${t2O}</td>
          <td>${fnM}</td><td></td><td style="font-weight:900">${fnO}</td>
          <td></td>
        </tr>
      </tbody>
    </table>

    <!-- BOTTOM SECTION -->
    <div class="rc-bot">
      <!-- Grading formula box (left in RTL = right side) -->
      <div class="rc-grd-box">
        <div class="rc-grd-ttl">گریڈنگ فارمولا</div>
        ${gradeRows.map(g=>`<div class="rc-grd-row${g.g===grade?' hi':''}">
          <span class="gval">${g.g}</span>
          <span class="glabel">${g.l}</span>
        </div>`).join('')}
      </div>

      <!-- Akhlaqiyat note (middle) -->
      <div class="rc-akh">
        ${hasAkh
          ? 'اخلاقیات کے پرچے کے حاصل کردہ نمبر کو 1.5 سے ضرب دی جائے گی اور حاصل کردہ نمبر کو مجموعی کل نمبر 150 میں سے دیا جائے گا'
          : '&nbsp;'}
        <div style="margin-top:8px;border:1px solid #1a6b3c;border-radius:5px;padding:6px">
          <div style="font-weight:700;color:#1a6b3c;margin-bottom:4px">کلاس ٹیچر کے تاثرات:</div>
          <div style="border-bottom:1px solid #bbb;min-height:14px;margin-bottom:4px;font-size:8px">${rmk}</div>
          <div style="border-bottom:1px solid #bbb;min-height:14px;margin-bottom:4px"></div>
          <div style="border-bottom:1px solid #bbb;min-height:14px"></div>
        </div>
        <!-- Result summary -->
        <div style="margin-top:8px;border:1px solid #1a6b3c;border-radius:5px;padding:6px">
          <table style="width:100%;font-size:9px">
            <tr><td style="font-weight:700">حاصل کردہ نمبر:</td><td style="font-weight:800;color:#1a6b3c;font-size:12px">${grandO} / ${grandM}</td></tr>
            <tr><td style="font-weight:700">فیصد:</td><td style="font-weight:800;color:#c0392b">${grandPct}%</td></tr>
            <tr><td style="font-weight:700">گریڈ:</td><td style="font-weight:900;font-size:20px;color:${gColor};line-height:1">${grade}</td></tr>
            <tr><td style="font-weight:700">نتیجہ:</td><td style="font-weight:800;color:${grandPct>=33?'#1a6b3c':'#c0392b'}">${grandPct>=33?'Pass ✓':'Fail ✗'}</td></tr>
          </table>
        </div>
      </div>
    </div>

    <!-- SIGNATURES -->
    <div class="rc-sigs">
      <div class="rc-sig">
        <div class="rc-sig-line"></div>
        <div class="rc-sig-lbl">Head of Institution Signature</div>
      </div>
      <div class="rc-sig">
        <div class="rc-sig-line"></div>
        <div class="rc-sig-lbl">Class Teacher Signature</div>
      </div>
    </div>

    <!-- Footer ribbon -->
    <div class="rc-foot">
      بچے قوم کا قیمتی سرمایہ ہیں، ان کے روشن مستقبل کے لیے انہیں زیور تعلیم سے آراستہ کرنے میں اپنا بھرپور Role ادا کریں۔
    </div>
  </div><!-- /rc-inner -->

  <!-- Bottom strip -->
  <div class="rc-botstrip"></div>
</div>`;
}

  ov.classList.remove('hidden');
  ov.style.display='flex';
}
function closePrint(){
  const ov=document.getElementById('printOverlay');
  ov.classList.add('hidden');
  ov.style.display='';
  document.getElementById('printContent').innerHTML='';
}

function openModal(title,body,foot=''){
  document.getElementById('mTitle').textContent=title;
  document.getElementById('mBody').innerHTML=body;
  document.getElementById('mFoot').innerHTML=foot;
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal(){document.getElementById('modal').classList.add('hidden')}

let toastT;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(type?' '+type:'');
  t.classList.remove('hidden');clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.add('hidden'),3200);
}

function toggleTermLock(t){
  TERM_LOCKS[t]=!TERM_LOCKS[t];
  saveTermLocks();
  const lbl=t==='T1'?'First Term':t==='T2'?'Mid Term':'Final Term';
  showToast(`${lbl} ${TERM_LOCKS[t]?'LOCKED 🔒':'UNLOCKED 🔓'}`);
  nav('settings');
}
function saveGasUrl(){
  const url=document.getElementById('gasUrlInp')?.value?.trim()||'';
  localStorage.setItem('sba_gas_url',url);
  GAS_URL=url;
  showToast('Google Sheets URL saved ✓');
}
async function testGasUrl(){
  const url=document.getElementById('gasUrlInp')?.value?.trim()||'';
  const el=document.getElementById('gasTestResult');
  if(!url){el.innerHTML='<span style="color:#c0392b">Please enter URL first</span>';return}
  el.innerHTML='⏳ Testing connection...';
  try{
    const r=await fetch(url+'?action=ping');
    const d=await r.json();
    if(d.ok)el.innerHTML='<span style="color:#1a6b3c">✅ Connected! '+d.msg+'</span>';
    else el.innerHTML='<span style="color:#c0392b">❌ Error: '+d.error+'</span>';
  }catch(e){el.innerHTML='<span style="color:#c0392b">❌ Could not connect. Check URL and deployment settings.</span>'}
}

document.addEventListener('DOMContentLoaded',()=>{
  loadMks();
  // load extra students from localStorage
  try{
    const ex=JSON.parse(localStorage.getItem('sba_students_extra')||'[]');
    ex.forEach(s=>{if(!STUDENTS.find(x=>x.e===s.e&&x.c===s.c))STUDENTS.push(s)})
  }catch{}
  document.getElementById('lp').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
});
